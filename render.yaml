services:
  - type: web
    name: ecoaware-app
    env: python
    plan: free
    buildCommand: |
      pip install --upgrade pip &&
      pip install -r requirements.txt
    startCommand: python -m gunicorn --bind 0.0.0.0:$PORT --workers 2 app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: 0
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
databases:
  - name: ecoaware-db
    engine: postgres
    plan: free
    version: "15"
